   <script>
    $(document).ready(function() {
        $(window).scroll(function() {
            if ($(this).scrollTop() > 100) { // אם הגלילה היא מעל 100 פיקסל
                $('.back-to-top').fadeIn();
            } else {
                $('.back-to-top').fadeOut();

            $('html, body').animate({scrollTop: 0}, 800);
        });
    });
